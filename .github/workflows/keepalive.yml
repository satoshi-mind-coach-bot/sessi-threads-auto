name: Keepalive

on:
  schedule:
    # 毎日 JST 6:00 = UTC 前日 21:00
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Keep workflow alive
        run: |
          git config user.email "bot@sessi-threads"
          git config user.name "SessiBot"
          git commit --allow-empty -m "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Re-enable post schedule
        run: gh workflow enable post.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger morning post
        run: gh workflow run post.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
