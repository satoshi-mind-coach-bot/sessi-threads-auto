name: Sessi Threads Auto Post

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refill queue if low
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python writer.py

      - name: Post to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python poster.py

      - name: Save updated queue
        run: |
          git config user.email "bot@sessi-threads"
          git config user.name "SessiBot"
          git add data/
          git diff --staged --quiet || git commit -m "Update queue"
          git push

      - name: Re-enable schedule (self-heal)
        run: gh workflow enable post.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
